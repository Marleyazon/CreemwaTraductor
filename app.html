    traduction = traduction.replace(/\bla tristesse\b/gi, "pakontenté");
    traduction = traduction.replace(/\btristesse\b/gi, "pakontenté");
    traduction = traduction.replace(/\bennuyeux\b/gi, "enhnwiye");
    traduction = traduction.replace(/\bennuyant\b/gi, "enhnwiyen");
    traduction = traduction.replace(/\bprovocant\b/gi, "agasen");
    traduction = traduction.replace(/\bcontent\b/gi, "konten");


        
    
    if (/\b(gazeuse|pétillante|plate)\b/gi.test(texte)) {
        traduction = traduction.replace(/\bo\s+(gazeuse|petiayent|plate)/gi, 'o$1');
    }

    // ==========================================
    // 7. REGLE DE COLLAGE FINALE
    // ==========================================
    if (!/\b(est|sont)\b/gi.test(texte)) {
        traduction = traduction.replace(/\b(lo|la)\s+(?!(?:de|un|unn|lo|la|des|pas|ni|du|le)\b)(\w+)/gi, '$1$2');
        traduction = traduction.replace(/\bde\s+(\w+)/gi, function(match, motSuivant) {
            var determinants = ["de", "un", "unn", "lo", "la", "des", "pas", "ni", "du", "le"];
            if (determinants.includes(motSuivant.toLowerCase())) {
                return match; 
            }
            if (positionsDes.includes(motSuivant.toLowerCase()) || motSuivant.toLowerCase() === "frwis" || positionsDes.includes("fruits")) {
                return "de" + motSuivant;
            }
            return match;
        });
    }
    
    document.getElementById("resultat").innerHTML = "Traduction : " + traduction;
}
</script>
